<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-12 text-center">
            <h2 class="font-display"><i class="bi bi-key-fill text-primary me-2"></i> Password Entropy Analyzer</h2>
            <p class="text-on-surface-variant">Construct a highly resilient access key.</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="cyber-card">
                <div class="mb-4">
                    <label class="form-label text-on-surface-variant text-uppercase tracking-wide">Enter Core Sequence</label>
                    <input type="text" class="form-control form-control-cyber fs-4 font-monospace text-center py-3" 
                           ng-model="password" ng-change="checkStrength()" placeholder="Type your password...">
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-on-surface-variant">Entropy Level</span>
                        <span class="fw-bold" ng-class="{'text-danger': entropy < 40, 'text-warning': entropy >= 40 && entropy < 80, 'text-success': entropy >= 80}">
                            {{ entropy }} Bits
                        </span>
                    </div>
                    <div class="progress progress-cyber bg-dark">
                        <div class="progress-bar progress-bar-cyber" role="progressbar" 
                             style="width: {{ entropy }}%"
                             ng-class="{'bg-danger': entropy < 40, 'bg-warning': entropy >= 40 && entropy < 80, 'bg-success': entropy >= 80}">
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <h4 class="font-display mb-3">Structural Integrity: 
                        <span ng-class="{'text-danger': strength === 'Weak', 'text-warning': strength === 'Medium', 'text-success': strength === 'Strong'}">
                            {{ strength | uppercase }}
                        </span>
                    </h4>
                    <ul class="list-unstyled text-start d-inline-block">
                        <li class="mb-2"><i class="bi me-2" ng-class="password.length > 8 ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-on-surface-variant'"></i> &gt; 8 characters</li>
                        <li class="mb-2"><i class="bi me-2" ng-class="password.length > 12 ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-on-surface-variant'"></i> &gt; 12 characters (Bonus)</li>
                        <li class="mb-2"><i class="bi me-2" ng-class="(password | lowercase) !== password && (password | uppercase) !== password ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-on-surface-variant'"></i> Mixed Case</li>
                        <li class="mb-2"><i class="bi me-2" ng-class="password.match('[0-9]') ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-on-surface-variant'"></i> Numbers</li>
                        <li class="mb-2"><i class="bi me-2" ng-class="password.match('[^a-zA-Z0-9]') ? 'bi-check-circle-fill text-success' : 'bi-x-circle text-on-surface-variant'"></i> Special Characters</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
