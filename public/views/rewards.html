<div class="container mt-5">
    <div class="row mb-5">
        <div class="col-12 text-center">
            <h1 class="font-display">Global Roster</h1>
            <p class="text-on-surface-variant">Top performing agents across all sectors.</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="surface-container-high p-4">
                <!-- Loading State -->
                <div ng-if="loading" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Accessing secure roster...</p>
                </div>

                <!-- Error State -->
                <div ng-if="error" class="alert alert-danger text-center">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>

                <!-- Empty State -->
                <div ng-if="!loading && !error && leaderboard.length === 0" class="text-center py-5">
                    <i class="bi bi-person-slash fs-1 text-secondary"></i>
                    <p class="mt-2 text-secondary">No agents have established scores yet.</p>
                </div>

                <!-- Leaderboard Data -->
                <div ng-if="!loading && !error" class="d-flex justify-content-between align-items-center border-bottom border-secondary pb-3 mb-3" ng-repeat="user in leaderboard">
                    <div class="d-flex align-items-center">
                        <div class="me-4 position-relative">
                            <i class="bi bi-hexagon-fill fs-1" ng-class="{'text-warning': user.rank === 1, 'text-secondary': user.rank === 2, 'text-danger': user.rank === 3, 'text-primary': user.rank > 3}"></i>
                            <span class="position-absolute top-50 start-50 translate-middle text-dark fw-bold">{{ user.rank }}</span>
                        </div>
                        <h4 class="mb-0 font-display">{{ user.name }}</h4>
                    </div>
                    <div>
                        <span class="fs-4 fw-bold text-tertiary">{{ user.score }} pts</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
