<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <a href="#!/admin" class="text-secondary text-decoration-none mb-2 d-inline-block"><i class="bi bi-arrow-left"></i> Back to Command Center</a>
                <h2 class="font-display">Agent Directory</h2>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="surface-container-high">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0 align-middle" style="background: transparent;">
                        <thead>
                            <tr class="text-uppercase tracking-wide text-on-surface-variant font-monospace fs-6">
                                <th>ID</th>
                                <th>Agent Name</th>
                                <th>Username</th>
                                <th>Clearance Level</th>
                                <th>Score</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr ng-repeat="user in users">
                                <td>#{{ user.id }}</td>
                                <td class="fw-bold">{{ user.name }}</td>
                                <td class="text-secondary">{{ user.username }}</td>
                                <td><span class="badge bg-primary">Level {{ user.level }}</span></td>
                                <td class="text-tertiary fw-bold">{{ user.score }}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-warning me-2"><i class="bi bi-key"></i> Reset</button>
                                    <button class="btn btn-sm btn-outline-danger" ng-click="removeUser(user.id)"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
