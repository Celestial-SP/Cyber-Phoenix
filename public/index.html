<!DOCTYPE html>
<html lang="en" ng-app="cyberPhoenixApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Phoenix Training Platform</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    
    <!-- App Header / Navigation -->
    <nav class="navbar navbar-expand-lg cyber-nav" ng-controller="NavCtrl">
        <div class="container-fluid">
            <a class="navbar-brand text-primary fw-bold font-display" href="#!/">
                <i class="bi bi-shield-shaded me-2"></i>CYBER-PHOENIX
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" ng-if="isLoggedIn()">
                    <li class="nav-item" ng-if="role === 'learner'">
                        <a class="nav-link" href="#!/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item" ng-if="role === 'learner'">
                        <a class="nav-link" href="#!/rewards">Leaderboard</a>
                    </li>
                    <li class="nav-item" ng-if="role === 'admin'">
                        <a class="nav-link" href="#!/admin">Admin Panel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="" ng-click="logout()">Logout ({{username}})</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto" ng-if="!isLoggedIn()">
                    <li class="nav-item">
                        <a class="nav-link" href="#!/">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main View Area with transition animation -->
    <main class="view-container">
        <div ng-view class="view-frame"></div>
    </main>

    <!-- AngularJS & Plugins -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-animate.min.js"></script>
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase SDKs (Compat version for traditional script inclusion) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <!-- Custom App Logic -->
    <script src="/app.js"></script>
</body>
</html>
